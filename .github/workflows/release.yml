name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name for the release (e.g. 2.3.5)'
        required: true
        default: 'dev'

env:
  VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version || 'dev' }}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build web app
        run: npx ng build --configuration production

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret is not set – building unsigned APK"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Decode keystore
        if: steps.signing.outputs.available == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > openradiation.keystore

      - name: Build signed APK
        if: steps.signing.outputs.available == 'true'
        run: |
          cd android
          ./gradlew --no-daemon assembleRelease \
            -PversCode=${{ github.run_number }} \
            -PversName="${{ env.VERSION_NAME }}" \
            -Pandroid.injected.signing.store.file="${{ github.workspace }}/openradiation.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.OPENRADIATION_KEYSTORE_PW }}" \
            -Pandroid.injected.signing.key.alias="openradiation" \
            -Pandroid.injected.signing.key.password="${{ secrets.OPENRADIATION_KEYSTORE_PW }}"

      - name: Build unsigned APK
        if: steps.signing.outputs.available != 'true'
        run: |
          cd android
          ./gradlew --no-daemon assembleDebug \
            -PversCode=${{ github.run_number }} \
            -PversName="${{ env.VERSION_NAME }}"

      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk -name '*.apk' | head -1)
          mkdir -p android/app/build/outputs/apk/out
          mv "$APK" "android/app/build/outputs/apk/out/openradiation-${{ env.VERSION_NAME }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/out/openradiation-*.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    if: ${{ vars.SKIP_IOS != 'true' }}
    steps:
      - name: Check signing secrets
        id: ios-signing
        run: |
          if [ -z "$CERT_B64" ] || [ -z "$PROV_B64" ]; then
            echo "::error::iOS signing secrets (IOS_CERTIFICATE_BASE64, IOS_PROVISIONING_PROFILE_BASE64) are not configured – skipping iOS build"
            exit 1
          fi
        env:
          CERT_B64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          PROV_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npx ng build --configuration production

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install

      - name: Import signing certificate
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k ~/Library/Keychains/build.keychain \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-keychain-settings -lut 21600 ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          security list-keychains -d user -s ~/Library/Keychains/build.keychain \
            ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "" \
            ~/Library/Keychains/build.keychain
          rm certificate.p12

      - name: Install provisioning profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          PROFILE_UUID=$(python3 -c "
          import plistlib, sys
          data = open('profile.mobileprovision', 'rb').read()
          start = data.index(b'<?xml')
          end = data.index(b'</plist>') + 8
          print(plistlib.loads(data[start:end]).get('UUID', ''))
          ")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          rm profile.mobileprovision

      - name: Build iOS archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ${{ github.workspace }}/App.xcarchive \
            MARKETING_VERSION="${{ env.VERSION_NAME }}" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ github.workspace }}/App.xcarchive \
            -exportOptionsPlist ${{ github.workspace }}/.github/ios-export-options.plist \
            -exportPath ${{ github.workspace }}/ios-output

      - name: Rename IPA
        run: mv ios-output/App.ipa ios-output/openradiation-${{ env.VERSION_NAME }}.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios-output/openradiation-*.ipa

  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    if: always() && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: ./artifacts/*
